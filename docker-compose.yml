services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-coworking}
      POSTGRES_USER: ${DB_USERNAME:-coworking}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-coworking}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-coworking} -d ${DB_DATABASE:-coworking}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8080}:80'
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-coworking}
      DB_USERNAME: ${DB_USERNAME:-coworking}
      DB_PASSWORD: ${DB_PASSWORD:-coworking}
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  storage_data:
