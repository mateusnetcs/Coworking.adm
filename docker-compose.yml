# Coolify: variaveis do app vao em "Variaveis de ambiente" no painel (nao duplique aqui).
# Dominio: adm.chatboot.cloud | Servico: app | Porta: 80

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
    volumes:
      # Nome novo = volume vazio no proximo deploy (senha MySQL recriada do zero).
      - mysql_data_v2:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - '80'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1/up || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: '3306'
      DB_DATABASE: '${DB_DATABASE}'
      DB_USERNAME: '${DB_USERNAME}'
      DB_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data_v2:
  storage_data:
