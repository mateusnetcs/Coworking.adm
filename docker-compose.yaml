# Mesmo conteudo de docker-compose.yml (Coolify procura .yaml por padrao).
# =============================================================================
# COOLIFY: Docker Compose | Dominio: adm.chatboot.cloud | Servico: app | Porta: 80
# =============================================================================

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-coworking_uemasul}
      MYSQL_USER: ${DB_USERNAME:-coworking}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-u${DB_USERNAME:-coworking}', '-p${DB_PASSWORD:-changeme}']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - '80'
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://adm.chatboot.cloud}
      FRONTEND_URL: ${FRONTEND_URL:-https://adm.chatboot.cloud}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-coworking_uemasul}
      DB_USERNAME: ${DB_USERNAME:-coworking}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-adm.chatboot.cloud}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://adm.chatboot.cloud}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  storage_data:
