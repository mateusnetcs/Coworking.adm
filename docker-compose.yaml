# Coolify: variaveis do app vao em "Variaveis de ambiente" no painel (nao duplique aqui).
# Dominio: adm.chatboot.cloud | Servico: app | Porta: 80

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-u${DB_USERNAME}', '-p${DB_PASSWORD}']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - '80'
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  storage_data:
